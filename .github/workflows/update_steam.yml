name: 自動更新 Steam 狀態

on:
  schedule:
    - cron: '*/5 * * * *'  # 每 5 分鐘執行一次
  workflow_dispatch:        # 允許手動點擊按鈕立即更新

jobs:
  update-steam:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4

      - name: 向 Steam 索取資料
        run: |
          # 🌟 請把下方的 7656119xxxxxxxxxx 換成你的 SteamID64
          STEAM_ID="你的17位數SteamID"
          
          curl -X GET "http://api.steampowered.com/ISteamUser/GetPlayerSummaries/v0002/?key=${{ secrets.STEAM_API_KEY }}&steamids=${STEAM_ID}" > steam_status.json
          
          # 檢查抓到的資料是否有效
          if grep -q "personaname" steam_status.json; then
            echo "✅ Steam 資料抓取成功"
          else
            echo "❌ 抓取失敗，請檢查 API KEY 或 SteamID"
            exit 1
          fi

      - name: 檢查並更新檔案
        run: |
          git config --global user.name "Witt-Steam-Bot"
          git config --global user.email "action@github.com"
          git add steam_status.json
          git commit -m "🤖 同步 Steam 狀態: $(date)" || exit 0
          git push