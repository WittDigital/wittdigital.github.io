<script>
async function updateBotStatus() {
    const SERVER_ID = '1330733636219043961'; // 你的伺服器 ID
    const TARGET_BOT_NAME = '\u7dad\u7279witt \u52a9\u624b'; // 你的 Bot 名字
    
    const badge = document.getElementById('bot-status-badge');
    const statusText = badge.querySelector('.status-text');

    try {
        // 直接向 Discord 官方獲取數據
        const response = await fetch(`https://discord.com/api/guilds/${SERVER_ID}/widget.json`);
        const data = await response.json();

        // 檢查成員名單中是否有你的 Bot
        const bot = data.members.find(m => m.username === TARGET_BOT_NAME);

        if (bot && bot.status !== 'offline') {
            // 正常上線中
            badge.className = 'badge online';
            statusText.innerText = '系統運作中';
        } else {
            // 離線
            badge.className = 'badge offline';
            statusText.innerText = '服務離線中';
        }
    } catch (error) {
        console.error("Status check failed:", error);
        statusText.innerText = '連線超時';
    }
}

// 啟動後立即檢查一次，隨後每 30 秒循環
updateBotStatus();
setInterval(updateBotStatus, 30000);
</script>
