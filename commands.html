<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>指令說明 | 維特 DC助手</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&family=Outfit:wght@300;400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-elements">
        <div class="glow glow-1"></div>
        <div class="glow glow-3"></div>
    </div>

    <nav class="navbar">
        <div class="logo"><span>Witt</span> Discord BOT</div>
        <ul class="nav-links">
            <li><a href="index.html">首頁</a></li>
            <li><a href="index.html#timeline">里程碑</a></li>
            <li><a href="commands.html" class="active">指令介紹</a></li>
        </ul>
    </nav>

    <section class="commands-section">
        <h2 class="section-title reveal">指令功能清單</h2>
        <p class="subtitle reveal">輸入斜線指令，開啟自動化社群體驗</p>

        <div class="commands-grid">
            <div class="command-card glass-card reveal">
                <div class="terminal-header">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                    <span class="command-name">/維特你好</span>
                </div>
                <div class="command-body">
                    <div class="command-demo">
                        <img src="https://via.placeholder.com/400x225/1a1a1a/6366f1?text=GIF+Demo+Coming+Soon" alt="指令演示">
                    </div>
                    <div class="command-info">
                        <h3>自我介紹</h3>
                        <p>讓維特助手向大家打個招呼，介紹自己的由來與功能初衷。</p>
                        <code class="code-badge">系統指令</code>
                    </div>
                </div>
            </div>

            <div class="command-card glass-card reveal">
                <div class="terminal-header">
                    <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
                    <span class="command-name">/英雄聯盟</span>
                </div>
                <div class="command-body">
                    <div class="command-demo">
                        <img src="https://via.placeholder.com/400x225/1a1a1a/ec4899?text=LOL+Stats+Demo" alt="LOL 指令">
                    </div>
                    <div class="command-info">
                        <h3>戰績查詢</h3>
                        <p>即時抓取召喚師的專精、目前排位與最近戰績訊息。</p>
                        <code class="code-badge">遊戲擴展</code>
                    </div>
                </div>
            </div>

            </div>
    </section>

    <footer>
        <p>© 2025-2026 witt dcbot. 讓社群變得更強大。</p>
    </footer>

    <script src="script.js"></script>

</html>
