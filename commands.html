</head>
<body>
    <div class="bg-elements">
        <div class="glow glow-1"></div>
        <div class="glow glow-3"></div>
    </div>

    <nav class="navbar">
        <div class="logo"><span>Witt</span> Discord BOT</div>
        <ul class="nav-links">
            <li><a href="index.html#home">首頁</a></li>
            <li><a href="index.html#intro">簡介</a></li>
            <li><a href="index.html#timeline">里程碑</a></li>
            <li><a href="index.html#future">未來展望</a></li>
            <li><a href="about.html" class="active">關於BOT</a></li>
            <li><a href="commands.html" class="active" style="color: var(--primary-color);">指令介紹</a></li>
        </ul>

<section class="commands-section">
    <h2 class="section-title reveal">指令功能清單</h2>
    <p class="subtitle reveal">輸入斜線指令，開啟自動化社群體驗</p>

    <div class="command-filters reveal">
        <button class="filter-btn active" data-filter="all">全部指令</button>
        <button class="filter-btn" data-filter="sys">系統管理</button>
        <button class="filter-btn" data-filter="game">遊戲擴展</button>
        <button class="filter-btn" data-filter="tool">實用工具</button>
    </div>

    <div class="commands-grid">
        <div class="command-card glass-card reveal sys">
            <div class="terminal-header">
                <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
                <span class="command-name">/維特你好</span>
            </div>
            <div class="command-body">
                <div class="command-demo"><img src="img/hello.gif" alt="指令演示"></div>
                <div class="command-info">
                    <h3>自我介紹</h3>
                    <p>讓維特助手向大家打個招呼。</p>
                    <code class="code-badge">系統管理</code>
                </div>
            </div>
        </div>

        <div class="command-card glass-card reveal tool">
    <div class="terminal-header">
        <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
        <span class="command-name">/刪除訊息</span>
    </div>
    <div class="command-body">
        <div class="command-demo">
            <video autoplay loop muted playsinline class="demo-video">
                <source src="assets/film/指令刪除訊息.mp4" type="video/mp4">
                您的瀏覽器不支援影片播放。
            </video>
        </div>
        <div class="command-info">
            <h3>刪除訊息</h3>
            <p>讓維特助手一次幫你刪除指定數量訊息。</p>
            <code class="code-badge">實用工具</code>
        </div>
    </div>
</div>

        <div class="command-card glass-card reveal game">
            <div class="terminal-header">
                <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
                <span class="command-name">/英雄聯盟</span>
            </div>
            <div class="command-body">
                <div class="command-demo"><img src="img/lol.gif" alt="LOL 指令"></div>
                <div class="command-info">
                    <h3>戰績查詢</h3>
                    <p>即時抓取召喚師目前排位與戰績。</p>
                    <code class="code-badge">遊戲擴展</code>
                </div>
            </div>
        </div>
    </div>
</section>

    <footer>
        <p>© 2025-2026 witt dcbot. 讓社群變得更強大。</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
